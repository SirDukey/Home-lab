---
- name: CONTAINER | Pull seerr image from Docker Hub
  docker_image:
    name: ghcr.io/seerr-team/seerr:latest
    source: pull
    state: present
  tags: seerr

- name: CONTAINER | Ensure seerr config volume is present
  community.docker.docker_volume:
    name: seerr_config
    state: present
  tags: seerr

- name: CONTAINER | Ensure media-config is Run
  ansible.builtin.include_tasks: media-config.yml
  tags: seerr

- name: CONTAINER | Run seerr container
  community.docker.docker_container:
    name: seerr
    state: started
    restart_policy: always
    ports:
      - "5055:5055/tcp"
    volumes:
      - seerr_config:/app/config
    env:
      TZ: Etc/UTC
    image: ghcr.io/seerr-team/seerr:latest
    networks:
      - name: media_network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
  tags: seerr
